# =============================================================================
# IM-WS 完整部署 —— 基于 sws 的 WebSocket IM 服务
# =============================================================================
# 架构:
#   Client → im-router (hash redirect) → NodePort → im-ws Pod → NATS
#   Pod → Pod: DNS im-ws-{N}.im-ws-headless → getaddrinfo → Pod IP
#
# 部署约束: 每节点一个 im-ws Pod (podAntiAffinity)
# 集群参数统一由 ConfigMap im-cluster-config 管理
# 扩容: kubectl edit configmap im-cluster-config → 改 NODE_COUNT → 重启
# =============================================================================

---
# =============================================================================
# 1. Namespace
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: gw

---
# =============================================================================
# 2. 共享 ConfigMap —— im-router 与 im-ws 统一参数来源
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: im-cluster-config
  namespace: gw
data:
  NODE_COUNT: "3"                          # 集群节点数 = StatefulSet replicas
  NODEPORT_BASE: "30001"                   # NodePort 起始端口
  DOMAIN: "ws.example.com"                 # im-router 返回的域名
  POD_DNS_FMT: "im-ws-{d}.im-ws-headless"  # Pod 间 DNS 模板

---
# =============================================================================
# 3. im-ws StatefulSet —— WebSocket 网关 (sws/Zig)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: im-ws-headless
  namespace: gw
spec:
  clusterIP: None
  selector:
    app: im-ws
  ports:
  - port: 9090
    targetPort: 9090
    name: ws
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: im-ws
  namespace: gw
  labels:
    app: im-ws
spec:
  serviceName: im-ws-headless
  replicas: 3
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  selector:
    matchLabels:
      app: im-ws
  template:
    metadata:
      labels:
        app: im-ws
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: im-ws
            topologyKey: kubernetes.io/hostname
      securityContext:
        seccompProfile:
          type: Localhost
          localhostProfile: seccomp/io_uring-allowed.json
      containers:
      - name: im-ws
        image: registry.example.com/im-ws:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9090
          name: ws
          protocol: TCP
        envFrom:
        - configMapRef:
            name: im-cluster-config
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NATS_URL
          value: "nats://nats-svc.gw:4222"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: im-secrets
              key: jwt-secret
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9090
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 15
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi

---
# =============================================================================
# 4. NodePort Services —— 每个 Pod 独立暴露 (外部客户端入口)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: im-ws-0-np
  namespace: gw
spec:
  type: NodePort
  selector:
    statefulset.kubernetes.io/pod-name: im-ws-0
  ports:
  - port: 9090
    targetPort: 9090
    nodePort: 30001
    name: ws
---
apiVersion: v1
kind: Service
metadata:
  name: im-ws-1-np
  namespace: gw
spec:
  type: NodePort
  selector:
    statefulset.kubernetes.io/pod-name: im-ws-1
  ports:
  - port: 9090
    targetPort: 9090
    nodePort: 30002
    name: ws
---
apiVersion: v1
kind: Service
metadata:
  name: im-ws-2-np
  namespace: gw
spec:
  type: NodePort
  selector:
    statefulset.kubernetes.io/pod-name: im-ws-2
  ports:
  - port: 9090
    targetPort: 9090
    nodePort: 30003
    name: ws

---
# =============================================================================
# 5. im-router Deployment —— 建连时路由 (Go, ~80行)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: im-router
  namespace: gw
  labels:
    app: im-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: im-router
  template:
    metadata:
      labels:
        app: im-router
    spec:
      containers:
      - name: router
        image: registry.example.com/im-router:latest
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: im-cluster-config
        env:
        - name: PORT
          value: "8080"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 1
          periodSeconds: 3
        resources:
          requests:
            cpu: 5m
            memory: 8Mi
          limits:
            cpu: 10m
            memory: 16Mi
---
apiVersion: v1
kind: Service
metadata:
  name: im-router-svc
  namespace: gw
spec:
  selector:
    app: im-router
  ports:
  - port: 80
    targetPort: 8080
    name: http
  type: ClusterIP

---
# =============================================================================
# 6. NATS —— 离线消息持久化
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: nats-headless
  namespace: gw
spec:
  clusterIP: None
  selector:
    app: nats
  ports:
  - port: 4222
    targetPort: 4222
    name: client
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: gw
data:
  nats.conf: |
    port: 4222
    http_port: 8222
    jetstream {
      store_dir: /data/jetstream
      max_memory_store: 256MB
      max_file_store: 1GB
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: gw
  labels:
    app: nats
spec:
  serviceName: nats-headless
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
      - name: nats
        image: nats:2.10-alpine
        args:
        - "-c"
        - "/etc/nats/nats.conf"
        - "-js"
        ports:
        - containerPort: 4222
          name: client
        - containerPort: 8222
          name: monitor
        volumeMounts:
        - name: config
          mountPath: /etc/nats
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
      volumes:
      - name: config
        configMap:
          name: nats-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nats-svc
  namespace: gw
spec:
  selector:
    app: nats
  ports:
  - port: 4222
    targetPort: 4222
    name: client
  - port: 8222
    targetPort: 8222
    name: monitor
  type: ClusterIP

---
# =============================================================================
# 7. Secrets —— JWT 密钥
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: im-secrets
  namespace: gw
type: Opaque
stringData:
  jwt-secret: "change-me-in-production-use-256-bit-key"

---
# =============================================================================
# 8. DNS 配置说明 (手动操作)
# =============================================================================
# 为 ws.example.com 配置 DNS A 记录 (多值, Round-Robin):
#   ws.example.com → Node1-IP
#   ws.example.com → Node2-IP
#   ws.example.com → Node3-IP
#
# 端口区分 Pod:
#   wss://ws.example.com:30001/ws → im-ws-0
#   wss://ws.example.com:30002/ws → im-ws-1
#   wss://ws.example.com:30003/ws → im-ws-2
